app:
  package: com.transsnet.store
  activity: com.afmobi.palmplay.home.MainActivity
  install_path: ""
  reset_before_case: false
  restart_before_case: true
  reset_after_case: false
  grant_permissions_before_case: true
  clear_cache_before_case: false

execution:
  tests: tests
  markers: ""
  keyword: ""
  reruns: 0
  device_offline_timeout_seconds: 60

performance:
  enabled: true
  metrics:
    - cpu
    - memory
  interval_seconds: 2

report:
  artifacts_dir: artifacts
  upload_url: ""
  upload_timeout_seconds: 10
  junit_xml: true
  save_raw_logcat: true

logcat:
  enabled: false
  clear_before_run: true
  filters:
    package: com.transsnet.store
    keywords: []

security:
  sanitize_enabled: true
  upload_raw_logcat: false
  custom_sensitive_patterns: []

wait:
  default_timeout_seconds: 10
  poll_interval_seconds: 0.5
  page_stable_timeout_seconds: 3

appium:
  host: 127.0.0.1
  base_port: 4723
  system_base_port: 8200
  mjpeg_base_port: 9100
  new_command_timeout: 120
  startup_timeout_seconds: 30
